<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connexion</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f6f8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #1a1a1a;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 380px;
    background: #ffffff;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    padding: 36px 32px;
  }

  .logo {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: #2563eb;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 18px;
    margin: 0 auto 18px;
  }

  h1 {
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 6px;
  }

  .subtitle {
    text-align: center;
    font-size: 14px;
    color: #6b7280;
    margin: 0 0 28px;
  }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #374151;
    margin-bottom: 6px;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    color: #1a1a1a;
    background: #fff;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  input[type="text"]:focus,
  input[type="password"]:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
  }

  .password-row {
    position: relative;
  }

  .password-row input {
    padding-right: 64px;
  }

  .toggle-vis {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #6b7280;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    padding: 4px;
  }

  .toggle-vis:hover {
    color: #2563eb;
  }

  .row-between {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 4px 0 22px;
    font-size: 13px;
  }

  .remember {
    display: flex;
    align-items: center;
    gap: 7px;
    color: #4b5563;
  }

  .remember input {
    width: 14px;
    height: 14px;
    cursor: pointer;
  }

  .forgot {
    color: #2563eb;
    text-decoration: none;
  }

  .forgot:hover {
    text-decoration: underline;
  }

  .btn-primary {
    width: 100%;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.08s ease;
  }

  .btn-primary:hover {
    background: #1d4ed8;
  }

  .btn-primary:active {
    transform: scale(0.99);
  }

  .btn-primary[disabled] {
    opacity: 0.6;
    cursor: progress;
  }

  .feedback {
    margin-top: 12px;
    font-size: 13px;
    min-height: 16px;
    text-align: center;
    color: #6b7280;
  }

  .feedback.ok { color: #16a34a; }
  .feedback.err { color: #dc2626; }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 24px 0 18px;
    color: #9ca3af;
    font-size: 12px;
  }

  .divider::before,
  .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: #e5e7eb;
  }

  .btn-secondary {
    width: 100%;
    background: #fff;
    border: 1px solid #d1d5db;
    color: #374151;
    border-radius: 8px;
    padding: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }

  .btn-secondary:hover {
    background: #f9fafb;
    border-color: #9ca3af;
  }

  .footer-note {
    text-align: center;
    margin-top: 22px;
    font-size: 13px;
    color: #6b7280;
  }

  .footer-note a {
    color: #2563eb;
    text-decoration: none;
    font-weight: 500;
  }

  .footer-note a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="card">
  <h1>Connexion</h1>
  <p class="subtitle">Entrez vos identifiants pour accéder à votre compte</p>

  <form id="login-form" autocomplete="off">
    <div class="field">
      <label for="username">Nom d'utilisateur</label>
      <input type="text" id="username" name="username" placeholder="votre_pseudo" required />
    </div>

    <div class="field">
      <label for="password">Mot de passe</label>
      <div class="password-row">
        <input type="password" id="password" name="password" placeholder="••••••••" required />
        <button type="button" class="toggle-vis" id="toggle-vis">Afficher</button>
      </div>
    </div>

    <div class="row-between">
      <label class="remember">
        <input type="checkbox" id="remember" />
        Se souvenir de moi
      </label>
      <a href="#" class="forgot" id="forgot-link">Mot de passe oublié ?</a>
    </div>

    <button type="submit" class="btn-primary" id="submit-btn">Se connecter</button>
    <div class="feedback" id="feedback"></div>
  </form>

  <div class="divider">ou</div>

  <button type="button" class="btn-secondary" id="create-btn">Créer un compte</button>

  <p class="footer-note">Pas encore inscrit ? <a href="#" id="signup-link">Rejoindre maintenant</a></p>
</div>

<script>
  const form = document.getElementById('login-form');
  const feedback = document.getElementById('feedback');
  const submitBtn = document.getElementById('submit-btn');
  const passwordInput = document.getElementById('password');
  const toggleVis = document.getElementById('toggle-vis');

  toggleVis.addEventListener('click', () => {
    const isPwd = passwordInput.type === 'password';
    passwordInput.type = isPwd ? 'text' : 'password';
    toggleVis.textContent = isPwd ? 'Masquer' : 'Afficher';
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();

    if (!username) {
      feedback.textContent = "Veuillez saisir un nom d'utilisateur";
      feedback.className = 'feedback err';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Connexion...';
    feedback.textContent = '';
    feedback.className = 'feedback';

    // Démo locale uniquement : aucune requête réseau n'est envoyée.
    setTimeout(() => {
      feedback.textContent = `Connexion simulée pour "${username}" (démo locale, rien n'est transmis)`;
      feedback.className = 'feedback ok';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Se connecter';
    }, 800);
  });

  document.getElementById('create-btn').addEventListener('click', () => {
    feedback.textContent = 'Redirection vers la création de compte (non implémentée dans cette démo)';
    feedback.className = 'feedback';
  });

  document.getElementById('forgot-link').addEventListener('click', (e) => {
    e.preventDefault();
    feedback.textContent = 'Procédure de récupération (non implémentée dans cette démo)';
    feedback.className = 'feedback';
  });

  document.getElementById('signup-link').addEventListener('click', (e) => {
    e.preventDefault();
    feedback.textContent = "Redirection vers inscription (non implémentée dans cette démo)";
    feedback.className = 'feedback';
  });
</script>

</body>
</html>
